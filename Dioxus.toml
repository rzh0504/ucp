[application]
name = "ucp"
out_dir = "dist"
asset_dir = "assets"

[web.app]
title = "UCP Clipboard"

[web.watcher]
reload_html = true
watch_path = ["src", "assets", "Dioxus.toml", "Cargo.toml"]

[web.resource]
style = []
script = []

[web.resource.dev]
style = []
script = []

[bundle]
identifier = "dev.ucp.clipboard"
publisher = "UCP"
icon = [
    "assets/icons/app.icns",
    "assets/icons/app.ico",
    "assets/icons/app-256x256.ico",
    "assets/icons/app-128x128.ico",
    "assets/icons/app-64x64.ico",
    "assets/icons/app-48x48.ico",
    "assets/icons/app-32x32.ico",
    "assets/icons/app-16x16.ico",
    "assets/icons/Ucp.png",
]
category = "Utility"
short_description = "Desktop clipboard history manager"
long_description = "A Windows-first desktop clipboard history manager built with Dioxus."

[bundle.windows]
icon_path = "assets/icons/app.ico"
webview_install_mode = "Skip"

[bundle.windows.nsis]
installer_hooks = "installer/windows/nsis-hooks.nsh"
